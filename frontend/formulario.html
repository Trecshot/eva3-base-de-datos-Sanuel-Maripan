<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="css/estilos.css">
    <style>
        .contenedor-form { max-width: 800px; margin: auto; padding: 20px; font-family: Arial, sans-serif; }
        .seccion-datos { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; color: #fff; }
        .grupo-input { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border-radius: 4px; border: 1px solid #555; background: #333; color: white; }
        input[type="date"] { color-scheme: dark; }
        .btn-submit { padding: 12px 20px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-submit:hover { background-color: #219653; }
    </style>
</head>
<body style="background-color: #121212; color: #e0e0e0;">

    <div class="contenedor-form">
        <nav style="margin-bottom: 20px;">
            <a href="inicio.html" style="color: #4da3ff; text-decoration: none;">&larr; Volver al Panel de Inicio</a>
        </nav>

        <h2>Crear Nuevo Usuario</h2>

        <form id="formUsuarioIntegrado">
            <div class="seccion-datos">
                <h3>1. Parámetros de Identidad</h3>
                <div class="grupo-input">
                    <label for="txtNombre">Nombre Completo:</label>
                    <input type="text" id="txtNombre" required>
                </div>
                <div class="grupo-input">
                    <label for="txtRut">RUT (con guion y dígito verificador):</label>
                    <input type="text" id="txtRut" required placeholder="Ej: 12345678-9">
                </div>
                <div class="grupo-input">
                    <label for="txtFechaNac">Fecha de Nacimiento:</label>
                    <input type="date" id="txtFechaNac" required>
                </div>
                <div class="grupo-input">
                    <label for="cmbGenero">Identificador de Género:</label>
                    <select id="cmbGenero" required>
                        <option value="">Seleccione...</option>
                        <option value="M">Masculino (M)</option>
                        <option value="F">Femenino (F)</option>
                        <option value="O">Otro (O)</option>
                    </select>
                </div>
            </div>

            <div class="seccion-datos">
                <h3>2. Vectores de Comunicación</h3>
                <div class="grupo-input">
                    <label for="txtCorreo">Correo Electrónico:</label>
                    <input type="email" id="txtCorreo" required>
                </div>
                <div class="grupo-input">
                    <label for="txtTelefono">Número Telefónico (Opcional):</label>
                    <input type="text" id="txtTelefono">
                </div>
                <div class="grupo-input">
                    <label for="txtNacionalidad">Nacionalidad (ISO-3166 Alpha-2):</label>
                    <input type="text" id="txtNacionalidad" maxlength="2" style="text-transform: uppercase;" required placeholder="Ej: CL">
                </div>
            </div>

            <div class="seccion-datos">
                <h3>3. Objeto de Dirección (Subdocumento)</h3>
                <div class="grupo-input">
                    <label for="txtComuna">Comuna de Residencia:</label>
                    <input type="text" id="txtComuna" required>
                </div>
                <div class="grupo-input">
                    <label for="txtCalle">Calle Principal:</label>
                    <input type="text" id="txtCalle" required>
                </div>
                <div class="grupo-input">
                    <label for="txtNumero">Numeración:</label>
                    <input type="text" id="txtNumero" required>
                </div>
                <div class="grupo-input">
                    <label for="txtDepto">Departamento/Oficina (Opcional):</label>
                    <input type="text" id="txtDepto">
                </div>
            </div>

            <div class="seccion-datos">
                <h3>4. Seguridad</h3>
                <div class="grupo-input">
                    <label for="txtPass">Contraseña de Acceso:</label>
                    <input type="password" id="txtPass" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-submit">Guardar Usuario</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const instanciaFormulario = document.getElementById('formUsuarioIntegrado');

            if (instanciaFormulario) {
                instanciaFormulario.addEventListener('submit', async (evento) => {
                    evento.preventDefault();

                    const payloadUsuario = {
                        nombre: document.getElementById('txtNombre').value,
                        rut: document.getElementById('txtRut').value,
                        correo: document.getElementById('txtCorreo').value,
                        telefono: document.getElementById('txtTelefono').value,
                        fechaNacimiento: document.getElementById('txtFechaNac').value,
                        nacionalidad: document.getElementById('txtNacionalidad').value.toUpperCase(),
                        genero: document.getElementById('cmbGenero').value,
                        contrasena: document.getElementById('txtPass').value,
                        direccion: {
                            comuna: document.getElementById('txtComuna').value,
                            calle: document.getElementById('txtCalle').value,
                            numero: document.getElementById('txtNumero').value,
                            departamento: document.getElementById('txtDepto').value
                        }
                    };

                    try {
                        const respuestaREST = await fetch('http://localhost:3000/guardarUsuario', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payloadUsuario)
                        });

                        const evaluacionRespuesta = await respuestaREST.json();

                        if (respuestaREST.ok) {
                            alert('Éxito: ' + evaluacionRespuesta.mensaje);
                            instanciaFormulario.reset();
                        } else {
                            alert('Error: ' + (evaluacionRespuesta.error || evaluacionRespuesta.mensaje));
                        }
                    } catch (errorExcepcion) {
                        alert('Fallo de comunicación con el servidor Node.js.');
                    }
                });
            }
        });
    </script>
</body>
</html>
